<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>扫雷</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0a18;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;
  color:#e8d5b0;padding:12px;gap:10px
}
h1{font-size:1.3rem;letter-spacing:.18em;color:#c8a040}
.top{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.ti{
  padding:5px 14px;border-radius:18px;font-weight:700;font-size:.82rem;
  border:2px solid;min-width:150px;text-align:center
}
.ti-idle{background:#1a1a2a;color:#aaaaff;border-color:#4444cc}
.ti-done{background:#1a2a1a;color:#aaffaa;border-color:#44cc44}
.ti-lose{background:#2a1010;color:#ffaaaa;border-color:#cc4444}
canvas{
  display:block;border-radius:8px;
  box-shadow:0 12px 50px rgba(0,0,0,.8),0 0 0 2px #8b6914;
  touch-action:none
}
.bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
.btn{
  padding:7px 16px;border-radius:8px;border:1px solid #c8a040;
  background:rgba(200,160,64,.15);color:#c8a040;cursor:pointer;
  font-family:inherit;font-size:.85rem;transition:background .2s
}
.btn:hover{background:rgba(200,160,64,.3)}
.difficulty{display:flex;gap:6px}
.diffbtn{
  padding:5px 12px;border-radius:6px;border:1px solid rgba(200,160,64,.35);
  background:rgba(200,160,64,.08);color:#c8a040;cursor:pointer;
  font-family:inherit;font-size:.78rem;transition:background .2s
}
.diffbtn:hover,.diffbtn.active{background:rgba(200,160,64,.3)}
.hint{font-size:.75rem;color:#445566;text-align:center}
</style>
</head>
<body>
<a href="./index.html" style="position:fixed;top:12px;left:16px;z-index:99;padding:6px 14px;background:rgba(200,160,64,.15);border:1px solid rgba(200,160,64,.4);color:#c8a040;border-radius:8px;font-size:.8rem;text-decoration:none;backdrop-filter:blur(4px)">🏠 返回主页</a>
<h1>💣 扫雷</h1>
<div class="top">
  <div class="ti ti-idle" id="ti">🙂 准备开始</div>
</div>
<canvas id="c"></canvas>
<div class="bar">
  <button class="btn" onclick="initGame()">重新开始</button>
  <div class="difficulty">
    <button class="diffbtn active" id="btnEasy" onclick="setDiff(9,9,10)">初级</button>
    <button class="diffbtn" id="btnMed" onclick="setDiff(16,16,40)">中级</button>
    <button class="diffbtn" id="btnHard" onclick="setDiff(30,16,99)">高级</button>
  </div>
</div>
<p class="hint">📱 单指点击 = 翻开 &nbsp;|&nbsp; 🔒 长按 = 标记地雷</p>

<script>
(function(){
  var COLS=9,ROWS=9,MINES=10;
  var CELL=32,HEADER=48;
  var canvas=document.getElementById('c');
  var ctx=canvas.getContext('2d');

  var grid,revealed,flagged,minePos,gameState,timer,startTime,timerInterval,minesLeft;
  gameState='idle';
  flagged={};

  var COLORS=['#4a9eff','#34c759','#ff3b30','#af52de','#ff9500','#00c7be','#1c1c1e','#636366'];

  function setDiff(c,r,m){
    COLS=c;ROWS=r;MINES=m;
    document.querySelectorAll('.diffbtn').forEach(function(b){b.classList.remove('active')});
    if(c===9){document.getElementById('btnEasy').classList.add('active')}
    else if(c===16){document.getElementById('btnMed').classList.add('active')}
    else{document.getElementById('btnHard').classList.add('active')}
    initGame();
  }

  function resize(){
    canvas.width=COLS*CELL;
    canvas.height=ROWS*CELL+HEADER;
    canvas.style.width=canvas.width+'px';
    canvas.style.height=canvas.height+'px';
  }

  function initGame(){
    clearInterval(timerInterval);
    flagged={};
    resize();
    grid=[];revealed=[];
    for(var r=0;r<ROWS;r++){grid[r]=[];revealed[r]=[];for(var c=0;c<COLS;c++){grid[r][c]=0;revealed[r][c]=false}}
    minePos=[];
    var placed=0;
    while(placed<MINES){
      var r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);
      if(!minePos.some(function(m){return m.r===r&&m.c===c})){
        minePos.push({r:r,c:c});grid[r][c]=-1;placed++;
      }
    }
    for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){
      if(grid[r][c]===-1)continue;
      var count=0;
      for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
        var nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&grid[nr][nc]===-1)count++;
      }
      grid[r][c]=count;
    }
    gameState='idle';minesLeft=MINES;startTime=null;timer=0;
    setStatus('🙂 准备开始','ti-idle');
    draw();
  }

  function setStatus(text,cls){document.getElementById('ti').textContent=text;document.getElementById('ti').className='ti '+cls;}

  function draw(){
    var W=canvas.width,H=canvas.height;
    ctx.fillStyle='#1a1a2a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#111827';ctx.fillRect(0,0,W,HEADER);

    // Mine counter
    ctx.fillStyle='#ff3b30';ctx.font='bold 22px monospace';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(String(Math.max(0,minesLeft)).padStart(3,'0'),8,HEADER/2+1);

    // Timer
    ctx.fillStyle='#e8d5b0';ctx.textAlign='right';
    ctx.fillText(String(timer).padStart(3,'0'),W-8,HEADER/2+1);

    // Face
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='22px serif';
    ctx.fillStyle=gameState==='lost'?'#ff6060':gameState==='won'?'#60ff60':'#c8a040';
    ctx.fillText(gameState==='lost'?'😵':gameState==='won'?'😎':'🙂',W/2,HEADER/2+1);

    // Cells
    for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){
      var x=c*CELL,y=r*CELL+HEADER;
      if(revealed[r][c]){
        ctx.fillStyle='#d0d0d8';ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
        var v=grid[r][c];
        if(v===-1){
          ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText('💣',x+CELL/2,y+CELL/2+1);
        }else if(v>0){
          ctx.fillStyle=COLORS[v-1]||'#000';ctx.font='bold 17px sans-serif';
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(v,x+CELL/2,y+CELL/2+1);
        }
      }else{
        ctx.fillStyle='#3a4a6a';ctx.fillRect(x,y,CELL,CELL);
        ctx.fillStyle='#5a6a8a';ctx.fillRect(x,y,CELL-1,2);ctx.fillRect(x,y,2,CELL-1);
        ctx.fillStyle='#2a3a5a';ctx.fillRect(x+CELL-1,y+1,1,CELL-1);ctx.fillRect(x+1,y+CELL-1,CELL-1,1);
      }
    }

    // Flags
    for(var k in flagged){
      var parts=k.split(','),r=parseInt(parts[0]),c=parseInt(parts[1]);
      if(revealed[r][c])continue;
      var x=c*CELL,y=r*CELL+HEADER;
      ctx.font='16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🚩',x+CELL/2,y+CELL/2);
    }

    // Touch hint overlay on first load (mobile only)
    if('ontouchstart' in window&&gameState==='idle'){
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,HEADER,COLS*CELL,ROWS*CELL);
      ctx.fillStyle='#fff';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('单击翻开 · 长按标记',COLS*CELL/2,HEADER+ROWS*CELL/2);
    }
  }

  function getCell(canvasX,canvasY){
    return{c:Math.floor(canvasX/CELL),r:Math.floor((canvasY-HEADER)/CELL)};
  }

  function floodFill(sr,sc){
    var queue=[{r:sr,c:sc}],visited={};
    while(queue.length){
      var cur=queue.shift(),k=cur.r+','+cur.c;
      if(visited[k])continue;visited[k]=true;
      if(cur.r<0||cur.r>=ROWS||cur.c<0||cur.c>=COLS)continue;
      if(revealed[cur.r][cur.c]||grid[cur.r][cur.c]===-1)continue;
      revealed[cur.r][cur.c]=true;
      if(grid[cur.r][cur.c]===0){
        for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){if(dr||dc)queue.push({r:cur.r+dr,c:cur.c+dc})}
      }
    }
  }

  function checkWin(){
    for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(!revealed[r][c]&&grid[r][c]!==-1)return false;
    return true;
  }

  function startTimer(){
    if(gameState!=='playing'){gameState='playing';startTime=Date.now();timer=0;
      timerInterval=setInterval(function(){if(gameState==='playing')timer=Math.floor((Date.now()-startTime)/1000);draw()},1000);
    }
  }

  function revealCell(r,c){
    if(r<0||r>=ROWS||c<0||c>=COLS)return;
    if(revealed[r][c])return;
    if(flagged[r+','+c])return;
    startTimer();
    if(grid[r][c]===-1){
      for(var i=0;i<minePos.length;i++)revealed[minePos[i].r][minePos[i].c]=true;
      gameState='lost';clearInterval(timerInterval);
      setStatus('💥 游戏结束','ti-lose');draw();return;
    }
    floodFill(r,c);
    if(checkWin()){gameState='won';clearInterval(timerInterval);minesLeft=0;
      setStatus('🎉 胜利！'+timer+'秒','ti-done');draw();return}
    draw();
  }

  function toggleFlag(r,c){
    if(r<0||r>=ROWS||c<0||c>=COLS)return;
    if(revealed[r][c])return;
    startTimer();
    var k=r+','+c;
    if(flagged[k]){delete flagged[k];minesLeft++}
    else{flagged[k]=true;minesLeft--}
    draw();
  }

  // ─── Touch Events ────────────────────────────────────────────────────────
  var longPressTimer=null;
  var touchStartTime=0;
  var touchMoved=false;
  var lastTapTime=0;

  canvas.addEventListener('touchstart',function(e){
    e.preventDefault();
    touchMoved=false;
    touchStartTime=Date.now();
    var t=e.touches[0];
    var rect=canvas.getBoundingClientRect();
    var sx=canvas.width/rect.width,sy=canvas.height/rect.height;
    var x=(t.clientX-rect.left)*sx;
    var y=(t.clientY-rect.top)*sy;

    // Face tap
    if(y<HEADER){initGame();return;}

    // Long press (500ms) = flag
    longPressTimer=setTimeout(function(){
      touchMoved=true;
      var cell=getCell(x,y);
      toggleFlag(cell.r,cell.c);
    },500);
  },{passive:false});

  canvas.addEventListener('touchmove',function(e){
    e.preventDefault();
    touchMoved=true;
    if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null}
  },{passive:false});

  canvas.addEventListener('touchend',function(e){
    e.preventDefault();
    if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null}
    if(touchMoved)return;
    var t=e.changedTouches[0];
    var rect=canvas.getBoundingClientRect();
    var sx=canvas.width/rect.width,sy=canvas.height/rect.height;
    var x=(t.clientX-rect.left)*sx;
    var y=(t.clientY-rect.top)*sy;
    var cell=getCell(x,y);
    revealCell(cell.r,cell.c);
  },{passive:false});

  // ─── Mouse Events ────────────────────────────────────────────────────────
  canvas.addEventListener('click',function(e){
    var rect=canvas.getBoundingClientRect();
    var sx=canvas.width/rect.width,sy=canvas.height/rect.height;
    var x=(e.clientX-rect.left)*sx;
    var y=(e.clientY-rect.top)*sy;
    if(y<HEADER){initGame();return}
    var cell=getCell(x,y);
    revealCell(cell.r,cell.c);
  });

  canvas.addEventListener('contextmenu',function(e){
    e.preventDefault();
    var rect=canvas.getBoundingClientRect();
    var sx=canvas.width/rect.width,sy=canvas.height/rect.height;
    var x=(e.clientX-rect.left)*sx;
    var y=(e.clientY-rect.top)*sy;
    if(y<HEADER)return;
    var cell=getCell(x,y);
    toggleFlag(cell.r,cell.c);
  });

  initGame();
})();
</script>
</body>
</html>
