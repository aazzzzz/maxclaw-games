<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>俄罗斯方块</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0a0a18;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    color:#e8d5b0;padding:10px;gap:8px
  }
  h1{font-size:1.2rem;letter-spacing:.2em;color:#c8a040}
  .wrap{display:flex;gap:14px;align-items:center;flex-wrap:wrap;justify-content:center}
  .game-wrap{display:flex;flex-direction:column;align-items:center;gap:0}
  canvas{display:block;border-radius:4px;image-rendering:pixelated}
  .main-canvas{box-shadow:0 8px 40px rgba(0,0,0,.8),0 0 0 2px #444}
  .side{
    display:flex;flex-direction:column;gap:8px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);
    border-radius:10px;padding:12px 10px;
  }
  .lbl{font-size:.65rem;color:#556;color:#7a8a9a;letter-spacing:.12em;text-transform:uppercase}
  .val{font-size:1.4rem;font-weight:700;color:#e8d5b0;font-variant-numeric:tabular-nums}
  .next-canvas{border-radius:6px;display:block}
  .bar-wrap{width:80px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
  .bar{height:100%;background:linear-gradient(90deg,#4a9eff,#a78bfa);border-radius:3px;transition:width .3s}
  canvas.rotated{transform:rotate(90deg)}
  .controls{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;align-items:center}
  .btn{
    padding:7px 14px;border-radius:8px;border:1px solid #c8a040;
    background:rgba(200,160,64,.12);color:#c8a040;cursor:pointer;
    font-family:inherit;font-size:.8rem;transition:background .2s;white-space:nowrap
  }
  .btn:hover{background:rgba(200,160,64,.25)}
  .btn.active{background:rgba(100,200,100,.15);color:#60cc80;border-color:rgba(100,200,100,.4)}
  .btn.music-btn{padding:7px 10px;font-size:.75rem}
  #overlay{
    display:none;position:absolute;inset:0;
    background:rgba(0,0,0,.75);backdrop-filter:blur(4px);
    border-radius:4px;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;z-index:10
  }
  #overlay h2{font-size:1.6rem;color:#c8a040;letter-spacing:.2em}
  #overlay p{font-size:.85rem;color:#8899aa}
  .hint{font-size:.7rem;color:#334455;text-align:center}
  .level-row{display:flex;flex-direction:column;align-items:center;gap:4px}
  .prog-wrap{width:80px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
  .prog{height:100%;background:#4a9eff;transition:width .2s}
</style>
</head>
<body>
<a href="./index.html" style="position:fixed;top:12px;left:16px;z-index:99;padding:5px 12px;background:rgba(200,160,64,.15);border:1px solid rgba(200,160,64,.4);color:#c8a040;border-radius:8px;font-size:.75rem;text-decoration:none;backdrop-filter:blur(4px)">🏠</a>
<h1>🧱 俄罗斯方块</h1>

<div class="wrap">
  <div class="game-wrap" style="position:relative">
    <canvas id="game-canvas" class="main-canvas" width="300" height="600"></canvas>
    <div id="overlay"><h2></h2><p></p></div>
  </div>
  <div class="side">
    <div><div class="lbl">Next</div><canvas id="next-canvas" class="next-canvas" width="100" height="80"></canvas></div>
    <div><div class="lbl">Score</div><div class="val" id="score">0</div></div>
    <div><div class="lbl">Lines</div><div class="val" id="lines">0</div></div>
    <div class="level-row">
      <div class="lbl">Level <span id="level">1</span></div>
      <div class="prog-wrap"><div class="prog" id="level-bar" style="width:0%"></div></div>
    </div>
    <div class="controls">
      <button class="btn" id="start-btn">▶ Start</button>
      <button class="btn" id="pause-btn">⏸ Pause</button>
      <button class="btn music-btn" id="music-btn" onclick="toggleMusic()">🔇 Music</button>
    </div>
  </div>
</div>
<p class="hint">← → 移动 · ↑ 旋转 · ↓ 加速 · 空格 硬降</p>

<script>
// ─── Constants ───────────────────────────────────────────────────
const COLS=10,ROWS=20,BLOCK=30;
const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
const nextCanvas=document.getElementById('next-canvas');
const nctx=nextCanvas.getContext('2d');

const COLORS=[
  null,
  '#ff2d55', // I
  '#5856d6', // J
  '#ff9500', // L
  '#ffcc00', // O
  '#34c759', // S
  '#00c7be', // T
  '#bf5af2', // Z
];

const PIECES=[
  null,
  [[1,1,1,1]],                           // I
  [[1,0,0],[1,1,1]],                     // J
  [[0,0,1],[1,1,1]],                     // L
  [[1,1],[1,1]],                         // O
  [[0,1,1],[1,1,0]],                     // S
  [[0,1,0],[1,1,1]],                     // T
  [[1,1,0],[0,1,1]],                     // Z
];

// ─── State ─────────────────────────────────────────────────────
let board,piece,nextPiece,score,lines,level,gameOver,paused,animId,dropCounter,dropInterval,lastTime;

// ─── Audio — Tetris Theme ───────────────────────────────────────
let audioCtx=null,musicPlaying=false,musicNode=null,gainNode=null;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

function midiToFreq(m){return 440*Math.pow(2,(m-69)/12)}

// Tetris Type A melody — E5 B4 C5 D5 | C5 B4 A4 G4 | A4 C5 E5 D5 C5 B4 A4 | B4 C5 D5 E5...
const TETRIS_MELODY=[
  // bar 1
  76,0,0,71,  74,0,0,72,  69,0,0,0,   67,0,0,0,
  // bar 2
  72,0,0,0,   71,0,0,72,  69,76,0,0,  72,0,0,0,
  // bar 3
  74,0,0,76,  77,0,0,0,   76,0,0,0,   72,0,0,0,
  // bar 4
  74,0,0,72,  71,0,0,0,   69,0,0,0,   67,0,0,0,
  // repeat with slight variation
  76,0,0,71,  74,0,0,72,  69,0,0,76,  74,0,0,0,
  // bar 6
  72,0,0,71,  72,0,0,0,   69,0,0,0,   67,0,0,0,
  // bar 7
  74,0,0,76,  79,0,0,0,    77,0,0,0,   74,0,0,0,
  // bar 8
  76,0,0,74,  72,0,0,0,     71,0,0,0,   69,0,0,0,
];
const TETRIS_BASS=[
  45,0,0,0, 45,0,0,0, 40,0,0,0, 40,0,0,0,
  48,0,0,0, 48,0,0,0, 43,0,0,0, 43,0,0,0,
  45,0,0,0, 45,0,0,0, 47,0,0,0, 47,0,0,0,
  50,0,0,0, 50,0,0,0, 45,0,0,0, 45,0,0,0,
  45,0,0,0, 45,0,0,0, 40,0,0,0, 47,0,0,0,
  48,0,0,0, 48,0,0,0, 43,0,0,0, 43,0,0,0,
  45,0,0,0, 45,0,0,0, 47,0,0,0, 50,0,0,0,
  52,0,0,0, 52,0,0,0, 45,0,0,0, 45,0,0,0,
];
const BPM=160;
const STEP_MS=(60000/BPM)/4; // 16th notes

function scheduleBar(bar,startTime,freqs,isBass){
  for(let i=0;i<bar.length;i++){
    const m=bar[i];
    if(m===0){continue}
    const freq=freqs(isBass?m:midiToFreq(m));
    const t=startTime+i*STEP_MS/1000;
    const dur=STEP_MS/1000*0.8;

    const osc=audioCtx.createOscillator();
    const env=audioCtx.createGain();
    osc.type=isBass?'triangle':'square';
    osc.frequency.value=freq;

    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime((isBass?0.12:0.06),t+0.01);
    env.gain.setValueAtTime((isBass?0.12:0.06),t+dur*0.6);
    env.gain.linearRampToValueAtTime(0,t+dur);

    osc.connect(env);
    env.connect(gainNode);
    osc.start(t);
    osc.stop(t+dur+0.05);
  }
}

function startMusic(){
  if(!audioCtx)return;
  stopMusic();
  musicPlaying=true;
  gainNode=audioCtx.createGain();
  gainNode.gain.value=0.4;
  gainNode.connect(audioCtx.destination);

  const totalBars=TETRIS_MELODY.length/16;
  function scheduleLoop(){
    if(!musicPlaying)return;
    const now=audioCtx.currentTime+0.1;
    for(let b=0;b<totalBars;b++){
      const barStart=now+b*16*STEP_MS/1000;
      const offset=b*16;
      scheduleBar(TETRIS_MELODY.slice(offset,offset+16),barStart,midiToFreq,false);
      scheduleBar(TETRIS_BASS.slice(offset,offset+16),barStart,function(f){return f},true);
    }
    const totalDur=totalBars*16*STEP_MS;
    musicNode=setTimeout(function(){
      if(musicPlaying)scheduleLoop();
    },totalDur-totalDur*0.1);
  }
  scheduleLoop();
  document.getElementById('music-btn').textContent='🔊 Music';
  document.getElementById('music-btn').classList.add('active');
}

function stopMusic(){
  musicPlaying=false;
  if(musicNode){clearTimeout(musicNode);musicNode=null}
  if(gainNode){gainNode.disconnect();gainNode=null}
}

function toggleMusic(){
  initAudio();
  if(audioCtx.state==='suspended')audioCtx.resume();
  if(musicPlaying){
    stopMusic();
    document.getElementById('music-btn').textContent='🔇 Music';
    document.getElementById('music-btn').classList.remove('active');
  }else{
    startMusic();
  }
}

// ─── Board ──────────────────────────────────────────────────────
function createBoard(){
  return Array.from({length:ROWS},()=>Array(COLS).fill(0));
}

function randomPiece(){
  const id=Math.floor(Math.random()*7)+1;
  return{id,matrix:PIECES[id].map(r=>[...r]),x:Math.floor((COLS-PIECES[id][0].length)/2),y:0};
}

function collide(b,p){
  for(let r=0;r<p.matrix.length;r++)
    for(let c=0;c<p.matrix[r].length;c++)
      if(p.matrix[r][c]!==0&&(b[r+p.y]===undefined||b[r+p.y][c+p.x]===undefined||b[r+p.y][c+p.x]!==0))
        return true;
  return false;
}

function merge(b,p){
  p.matrix.forEach((row,r)=>row.forEach((v,c)=>{if(v!==0&&r+p.y>=0)b[r+p.y][c+p.x]=v}));
}

function rotate(m){
  const N=m.length;
  return Array.from({length:N},(_,r)=>Array.from({length:N},(_,c)=>m[N-1-c][r]));
}

// ─── Sound Effects ──────────────────────────────────────────────
function playBeep(freq,dur,type){
  if(!audioCtx)return;
  const osc=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  osc.type=type||'square';
  osc.frequency.value=freq;
  g.gain.setValueAtTime(0.08,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  osc.connect(g);g.connect(audioCtx.destination);
  osc.start();osc.stop(audioCtx.currentTime+dur+0.02);
}

function playMove(){playBeep(440,0.05,'square')}
function playRotate(){playBeep(330,0.06,'sine')}
function playDrop(){playBeep(200,0.1,'triangle')}
function playLock(){playBeep(130,0.08,'triangle')}
function playClear(){
  playBeep(523,0.08,'square');setTimeout(()=>playBeep(659,0.08,'square'),80);
  setTimeout(()=>playBeep(784,0.15,'square'),160);
}
function playGameOver(){
  playBeep(311,0.2,'sawtooth');
  setTimeout(()=>playBeep(261,0.2,'sawtooth'),200);
  setTimeout(()=>playBeep(220,0.4,'sawtooth'),400);
}

// ─── Line Clear ────────────────────────────────────────────────
function clearLines(){
  let cleared=0;
  outer:
  for(let r=ROWS-1;r>=0;r--){
    for(let c=0;c<COLS;c++)if(!board[r][c])continue outer;
    board.splice(r,1);
    board.unshift(Array(COLS).fill(0));
    cleared++;r++;
  }
  if(cleared===0)return;
  const pts=[0,100,300,500,800][cleared]*level;
  score+=pts;lines+=cleared;
  document.getElementById('score').textContent=score;
  document.getElementById('lines').textContent=lines;
  const newLevel=Math.floor(lines/10)+1;
  if(newLevel>level&&newLevel<=15){
    level=newLevel;
    dropInterval=Math.max(50,1000-Math.pow(level-1,60));
    document.getElementById('level').textContent=level;
  }
  document.getElementById('level-bar').style.width=(lines%10)*10+'%';
  playClear();
}

// ─── Drawing ───────────────────────────────────────────────────
function drawBlock(ctx,x,y,colorId,size){
  const s=size||BLOCK;
  ctx.fillStyle=colorId?COLORS[colorId]:'#222';
  ctx.fillRect(x*s+1,y*s+1,s-2,s-2);
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fillRect(x*s+2,y*s+2,s-4,3);
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(x*s+2,y*s+s-3,s-2,2);
}

function drawBoard(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#111827';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      if(board[r][c])drawBlock(ctx,c,r,board[r][c]);

  if(!piece)return;

  // Ghost piece
  let ghostY=piece.y;
  while(!collide(board,{...piece,y:ghostY+1}))ghostY++;
  if(ghostY>piece.y){
    piece.matrix.forEach((row,r)=>
      row.forEach((v,c)=>{
        if(v){
          ctx.fillStyle='rgba(255,255,255,0.06)';
          ctx.fillRect((c+piece.x)*BLOCK+1,(r+ghostY)*BLOCK+1,BLOCK-2,BLOCK-2);
          ctx.strokeStyle='rgba(255,255,255,0.25)';
          ctx.lineWidth=1;
          ctx.strokeRect((c+piece.x)*BLOCK+1.5,(r+ghostY)*BLOCK+1.5,BLOCK-3,BLOCK-3);
        }
      })
    );
  }

  // Active piece
  piece.matrix.forEach((row,r)=>
    row.forEach((v,c)=>{if(v)drawBlock(ctx,c+piece.x,r+piece.y,v)})
  );
}

function drawNext(){
  nctx.clearRect(0,0,nextCanvas.width,nextCanvas.height);
  nctx.fillStyle='#0d1117';
  nctx.fillRect(0,0,nextCanvas.width,nextCanvas.height);
  if(!nextPiece)return;
  const bs=18;
  const offX=Math.floor((nextCanvas.width/bs-nextPiece.matrix[0].length)/2);
  const offY=Math.floor((nextCanvas.height/bs-nextPiece.matrix.length)/2);
  nextPiece.matrix.forEach((row,r)=>
    row.forEach((v,c)=>{
      if(!v)return;
      const x=(c+offX)*bs,y=(r+offY)*bs;
      nctx.fillStyle=COLORS[v];
      nctx.fillRect(x+1,y+1,bs-2,bs-2);
      nctx.fillStyle='rgba(255,255,255,0.15)';
      nctx.fillRect(x+2,y+2,bs-4,3);
    })
  );
}

// ─── Controls ──────────────────────────────────────────────────
function hardDrop(){
  while(!collide(board,piece))piece.y++;
  playDrop();lockPiece();
}

function lockPiece(){
  playLock();
  merge(board,piece);
  clearLines();
  piece=nextPiece;
  nextPiece=randomPiece();
  drawNext();
  if(collide(board,piece)){
    gameOver=true;
    if(musicPlaying)stopMusic();
    playGameOver();
    showOverlay('GAME OVER','Score: '+score+' · Lines: '+lines);
  }
}

function showOverlay(title,sub){
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML='<h2>'+title+'</h2><p>'+sub+'</p>';
}
function hideOverlay(){document.getElementById('overlay').style.display='none'}

function gameLoop(time=0){
  const delta=time-lastTime;
  lastTime=time;
  dropCounter+=delta;
  if(dropCounter>=dropInterval){
    dropCounter=0;
    piece.y++;
    if(collide(board,piece)){piece.y--;lockPiece();}
  }
  drawBoard();
  if(!gameOver&&!paused)animId=requestAnimationFrame(gameLoop);
}

function startGame(){
  initAudio();
  if(audioCtx.state==='suspended')audioCtx.resume();
  board=createBoard();
  score=0;lines=0;level=1;
  dropInterval=1000;dropCounter=0;lastTime=0;
  gameOver=false;paused=false;
  document.getElementById('score').textContent='0';
  document.getElementById('lines').textContent='0';
  document.getElementById('level').textContent='1';
  document.getElementById('level-bar').style.width='0%';
  piece=randomPiece();
  nextPiece=randomPiece();
  drawNext();
  hideOverlay();
  cancelAnimationFrame(animId);
  animId=requestAnimationFrame(gameLoop);
  if(musicPlaying){stopMusic();startMusic()}
}

// ─── Events ────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('pause-btn').addEventListener('click',function(){
  if(gameOver)return;
  paused=!paused;
  document.getElementById('pause-btn').textContent=paused?'▶ Resume':'⏸ Pause';
  if(!paused){lastTime=performance.now();animId=requestAnimationFrame(gameLoop);}
  if(!paused)hideOverlay();
});

document.addEventListener('keydown',function(e){
  if(!piece||gameOver){
    if(e.code==='Space'){e.preventDefault();startGame();}
    return;
  }
  if(e.code==='KeyP'){document.getElementById('pause-btn').click();return;}
  if(paused)return;
  switch(e.code){
    case'ArrowLeft':piece.x--;if(collide(board,piece))piece.x++;playMove();break;
    case'ArrowRight':piece.x++;if(collide(board,piece))piece.x--;playMove();break;
    case'ArrowDown':piece.y++;if(collide(board,piece)){piece.y--;lockPiece();}dropCounter=0;break;
    case'ArrowUp':{
      const prev=piece.matrix;
      piece.matrix=rotate(piece.matrix);
      if(collide(board,piece)){
        piece.x--;
        if(collide(board,piece)){piece.x+=2;if(collide(board,piece)){piece.x--;piece.matrix=prev;}}
      }
      playRotate();
      break;
    }
    case'KeyZ':case'ShiftLeft':{
      const prev=piece.matrix;
      piece.matrix=rotate(piece.matrix);
      piece.matrix.forEach(row=>row.reverse());
      if(collide(board,piece)){
        piece.x--;
        if(collide(board,piece)){piece.x+=2;if(collide(board,piece)){piece.x--;piece.matrix=prev;}}
      }
      playRotate();
      break;
    }
    case'Space':e.preventDefault();hardDrop();break;
  }
});

// Touch controls
let touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  const t=e.touches[0];
  touchStartX=t.clientX;touchStartY=t.clientY;
},{passive:false});
canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  const t=e.changedTouches[0];
  const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
  if(Math.abs(dx)<10&&Math.abs(dy)<10){
    // Tap = start
    if(gameOver||!piece){startGame();return;}
    // Tap on left/right side of canvas = move
    const rect=canvas.getBoundingClientRect();
    const tapX=e.changedTouches[0].clientX-rect.left;
    if(tapX<rect.width/3){piece.x--;if(collide(board,piece))piece.x++;playMove();}
    else if(tapX>rect.width*2/3){piece.x++;if(collide(board,piece))piece.x--;playMove();}
    else{hardDrop();}
    return;
  }
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20){piece.x++;if(collide(board,piece))piece.x--;playMove();}
    else if(dx<-20){piece.x--;if(collide(board,piece))piece.x++;playMove();}
  }else{
    if(dy>30){
      piece.y++;if(collide(board,piece)){piece.y--;lockPiece();}
      dropCounter=0;
    }
    if(dy<-30){
      const prev=piece.matrix;piece.matrix=rotate(piece.matrix);
      if(collide(board,piece)){piece.x++;if(collide(board,piece)){piece.x--;piece.matrix=prev;}}
      playRotate();
    }
  }
},{passive:false});

// Init
startGame();
</script>
</body>
</html>
