<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>五子棋</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#1a1008;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;
  color:#e8d5b0;padding:10px;gap:8px
}
h1{font-size:1.3rem;letter-spacing:.2em;color:#c8a040}
.top{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.ti{
  padding:5px 14px;border-radius:18px;font-weight:700;font-size:.85rem;
  border:2px solid;min-width:130px;text-align:center
}
.ti-bk{background:#1a1a2a;color:#aaaaff;border-color:#4444cc}
.ti-wh{background:#2a1a1a;color:#ffaaaa;border-color:#cc4444}
.ti-done{background:#1a2a1a;color:#aaffaa;border-color:#44cc44}
canvas{
  display:block;border-radius:6px;
  box-shadow:0 16px 60px rgba(0,0,0,.9),0 0 0 3px #8b6914;
  cursor:pointer;touch-action:none
}
.bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
.btn{
  padding:7px 16px;border-radius:8px;border:1px solid #c8a040;
  background:rgba(200,160,64,.15);color:#c8a040;cursor:pointer;
  font-family:inherit;font-size:.85rem;transition:background .2s
}
.btn:hover{background:rgba(200,160,64,.3)}
.deep{font-size:.75rem;color:#556655;padding:4px 10px;background:rgba(100,200,100,.07);border:1px solid rgba(100,200,100,.18);border-radius:20px}
#err{color:#ff6060;font-size:.8rem;display:none}
</style>
</head>
<body>
<a href="./index.html" style="position:fixed;top:12px;left:16px;z-index:99;padding:6px 14px;background:rgba(200,160,64,.15);border:1px solid rgba(200,160,64,.4);color:#c8a040;border-radius:8px;font-size:.8rem;text-decoration:none;backdrop-filter:blur(4px)">🏠 返回主页</a>
<h1>⚫ 五子棋 ⚪</h1>
<div class="top">
  <div class="ti ti-bk" id="ti">⚫ 黑方回合</div>
  <div style="font-size:.8rem;color:#556677" id="think"></div>
</div>
<canvas id="c"></canvas>
<div id="err"></div>
<div class="bar">
  <button class="btn" onclick="undoMove()">悔棋</button>
  <button class="btn" onclick="initGame()">重新开始</button>
  <div class="deep">🤖 AI深度6层</div>
  <div style="font-size:.8rem;color:#556677">五子连珠获胜</div>
</div>

<script>
(function(){
  // ── Constants ────────────────────────────────────────────────────────────
  var BS=15, CELL=36, PAD=22;
  var SZ=(BS-1)*CELL+PAD*2; // = 548

  // ── DOM ─────────────────────────────────────────────────────────────────
  var canvas=document.getElementById('c');
  var ctx=canvas.getContext('2d');
  canvas.width=SZ;
  canvas.height=SZ;

  function resizeCanvas(){
    var a=Math.min(window.innerWidth-24,window.innerHeight-180,SZ);
    canvas.style.width=a+'px';
    canvas.style.height=a+'px';
  }
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);

  // ── State ────────────────────────────────────────────────────────────────
  var board, currentPlayer, gameOver, lastMove, thinking, moveHistory;

  // ── Init ─────────────────────────────────────────────────────────────────
  function initGame(){
    board=[];
    for(var r=0;r<BS;r++) board[r]=[];
    for(var r=0;r<BS;r++) for(var c=0;c<BS;c++) board[r][c]=0;
    currentPlayer=1; gameOver=false; lastMove=null; thinking=false; moveHistory=[];
    document.getElementById('ti').textContent='⚫ 黑方回合';
    document.getElementById('ti').className='ti ti-bk';
    document.getElementById('think').textContent='';
    document.getElementById('err').style.display='none';
    drawBoard();
  }

  function setStatus(text,cls){
    document.getElementById('ti').textContent=text;
    document.getElementById('ti').className='ti '+cls;
  }

  // ── Drawing ──────────────────────────────────────────────────────────────
  function drawBoard(){
    var W=parseFloat(canvas.style.width)||SZ;
    var scale=SZ/W;

    // Wood background
    var g=ctx.createLinearGradient(0,0,SZ,SZ);
    g.addColorStop(0,'#d4a04a');g.addColorStop(.5,'#c8903c');g.addColorStop(1,'#d4a04a');
    ctx.fillStyle=g;
    ctx.fillRect(0,0,SZ,SZ);

    // Grid lines
    ctx.strokeStyle='rgba(80,50,10,.55)';
    ctx.lineWidth=1;
    for(var i=0;i<BS;i++){
      var p=PAD+i*CELL;
      ctx.beginPath();ctx.moveTo(PAD,p);ctx.lineTo(PAD+(BS-1)*CELL,p);ctx.stroke();
      ctx.beginPath();ctx.moveTo(p,PAD);ctx.lineTo(p,PAD+(BS-1)*CELL);ctx.stroke();
    }

    // Star points
    var sp=[[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
    for(var i=0;i<sp.length;i++){
      ctx.fillStyle='rgba(80,50,10,.8)';
      ctx.beginPath();ctx.arc(PAD+sp[i][0]*CELL,PAD+sp[i][1]*CELL,3.5,0,Math.PI*2);ctx.fill();
    }

    // Pieces
    for(var r=0;r<BS;r++) for(var c=0;c<BS;c++){
      if(board[r][c]) drawStone(r,c,board[r][c]);
    }

    // Last move ring
    if(lastMove){
      ctx.strokeStyle='#ffee00';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(PAD+lastMove.r*CELL,PAD+lastMove.c*CELL,8,0,Math.PI*2);ctx.stroke();
    }
  }

  function drawStone(r,c,player){
    var x=PAD+r*CELL, y=PAD+c*CELL, R=CELL*0.43;
    ctx.fillStyle='rgba(0,0,0,.28)';
    ctx.beginPath();ctx.arc(x+2,y+3,R,0,Math.PI*2);ctx.fill();
    var g=ctx.createRadialGradient(x-R*.3,y-R*.3,0,x,y,R);
    if(player===1){g.addColorStop(0,'#666');g.addColorStop(1,'#111');}
    else{g.addColorStop(0,'#fff');g.addColorStop(1,'#ccc');}
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=player===1?'#000':'rgba(120,120,120,.5)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=player===1?'rgba(255,255,255,.18)':'rgba(255,255,255,.5)';
    ctx.beginPath();ctx.arc(x-R*.28,y-R*.28,R*.32,0,Math.PI*2);ctx.fill();
  }

  function drawWinLine(r,c,player){
    var dirs=[[1,0],[0,1],[1,1],[1,-1]];
    outer:
    for(var d=0;d<4;d++){
      var dr=dirs[d][0],dc=dirs[d][1],cells=[{r:r,c:c}];
      for(var i=1;i<5;i++){var nr=r+dr*i,nc=c+dc*i;if(nr<0||nr>=BS||nc<0||nc>=BS||board[nr][nc]!==player)break;cells.push({r:nr,c:nc})}
      for(var i=1;i<5;i++){var nr=r-dr*i,nc=c-dc*i;if(nr<0||nr>=BS||nc<0||nc>=BS||board[nr][nc]!==player)break;cells.push({r:nr,c:nc})}
      cells.sort(function(a,b){return a.r*BS+a.c-b.r*BS-b.c});
      if(cells.length>=5){
        ctx.strokeStyle='#ffee00';ctx.lineWidth=4;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(PAD+cells[0].r*CELL,PAD+cells[0].c*CELL);
        for(var i=1;i<cells.length;i++)ctx.lineTo(PAD+cells[i].r*CELL,PAD+cells[i].c*CELL);
        ctx.stroke();break outer;
      }
    }
  }

  // ── Win Check ───────────────────────────────────────────────────────────
  function checkWin(b,r,c,player){
    if(!b[r][c])return false;
    var dirs=[[1,0],[0,1],[1,1],[1,-1]];
    for(var d=0;d<4;d++){
      var dr=dirs[d][0],dc=dirs[d][1],cnt=1;
      for(var i=1;i<5;i++){var nr=r+dr*i,nc=c+dc*i;if(nr<0||nr>=BS||nc<0||nc>=BS||b[nr][nc]!==player)break;cnt++}
      for(var i=1;i<5;i++){var nr=r-dr*i,nc=c-dc*i;if(nr<0||nr>=BS||nc<0||nc>=BS||b[nr][nc]!==player)break;cnt++}
      if(cnt>=5)return true;
    }
    return false;
  }

  // ── AI ─────────────────────────────────────────────────────────────────
  var P5=10000000,L4=200000,L3=8000,S3=500,T2=100,T1=30;

  function pat(cnt,open){
    if(cnt>=5)return P5;
    if(cnt===4){if(open>=2)return L4;if(open===1)return 20000;return 0}
    if(cnt===3){if(open>=2)return L3;if(open===1)return S3;return 0}
    if(cnt===2){if(open>=2)return T2;if(open===1)return T1;return 0}
    return 0;
  }

  function lineScore(h,player){
    var best=0,cnt=0,open=0;
    for(var i=0;i<h.length;i++){
      if(h[i]===player){cnt++;open=0;continue}
      if(!h[i]){if(cnt>0)best+=pat(cnt,open+1);cnt=0;open=1;continue}
      if(cnt>0)best+=pat(cnt,open);cnt=0;open=0;
    }
    if(cnt>0)best+=pat(cnt,open);
    return best;
  }

  function evaluate(b,player){
    var total=0,opp=3-player;
    for(var r=0;r<BS;r++)for(var c=0;c<BS;c++){
      if(b[r][c])continue;
      var h=[],v=[],d1=[],d2=[];
      for(var i=Math.max(0,c-4);i<=Math.min(BS-1,c+4);i++)h.push(b[r][i]);
      for(var i=Math.max(0,r-4);i<=Math.min(BS-1,r+4);i++)v.push(b[i][c]);
      var r1=Math.max(0,r-4),c1=Math.max(0,c-4);
      while(r1<=Math.min(BS-1,r+4)&&c1<=Math.min(BS-1,c+4))d1.push(b[r1++][c1++]);
      var r2=Math.max(0,r-4),c2=Math.min(BS-1,c+4);
      while(r2<=Math.min(BS-1,r+4)&&c2>=Math.max(0,c-4))d2.push(b[r2++][c2--]);
      total+=(lineScore(h,player)+lineScore(h,opp))*1.1;
      total+=(lineScore(v,player)+lineScore(v,opp))*1.1;
      total+=lineScore(d1,player)+lineScore(d1,opp);
      total+=lineScore(d2,player)+lineScore(d2,opp);
    }
    return total;
  }

  function getCands(b){
    var seen={},cands=[];
    for(var r=0;r<BS;r++)for(var c=0;c<BS;c++){
      if(b[r][c]){
        for(var dr=-2;dr<=2;dr++)for(var dc=-2;dc<=2;dc++){
          var nr=r+dr,nc=c+dc;
          if(nr<0||nr>=BS||nc<0||nc>=BS||b[nr][nc])continue;
          var k=nr*100+nc;
          if(!seen[k]){seen[k]=true;cands.push({r:nr,c:nc})}
        }
      }
    }
    if(!cands.length){cands.push({r:7,c:7});return cands}
    cands.sort(function(a,b){return(Math.abs(a.r-7)+Math.abs(a.c-7))-(Math.abs(b.r-7)+Math.abs(b.c-7))});
    return cands.slice(0,24);
  }

  function threatScore(b,r,c,player){
    var dirs=[[1,0],[0,1],[1,1],[1,-1]],score=0;
    for(var d=0;d<4;d++){
      var dr=dirs[d][0],dc=dirs[d][1],cnt=0,open=0;
      for(var i=0;i<5;i++){var nr=r+dr*i,nc=c+dc*i;if(nr<0||nr>=BS||nc<0||nc>=BS)break;if(b[nr][nc]===player)cnt++;else{if(!b[nr][nc])open++;break}}
      for(var i=1;i<5;i++){var nr=r-dr*i,nc=c-dc*i;if(nr<0||nr>=BS||nc<0||nc>=BS)break;if(b[nr][nc]===player)cnt++;else{if(!b[nr][nc])open++;break}}
      if(cnt>=4&&open>0)score+=50000;
      else if(cnt===3&&open>0)score+=3000;
      else if(cnt===2&&open>1)score+=300;
    }
    return score;
  }

  function sortCands(cands,player){
    for(var i=0;i<cands.length;i++){
      cands[i].s=threatScore(board,cands[i].r,cands[i].c,player)*1.5+
                threatScore(board,cands[i].r,cands[i].c,3-player);
    }
    cands.sort(function(a,b){return b.s-a.s});
    return cands;
  }

  function negamax(b,depth,alpha,beta,player){
    // Win check
    for(var r=0;r<BS;r++)for(var c=0;c<BS;c++){
      if(!b[r][c]){b[r][c]=player;if(checkWin(b,r,c,player)){b[r][c]=0;return 90000};b[r][c]=0}
    }
    if(depth<=0)return evaluate(b,player);
    var cands=getCands(b);
    sortCands(cands,player);
    if(!cands.length)return evaluate(b,player);
    var best=-Infinity;
    var limit=Math.min(cands.length,24);
    for(var i=0;i<limit;i++){
      b[cands[i].r][cands[i].c]=player;
      var v=-negamax(b,depth-1,-beta,-alpha,3-player);
      b[cands[i].r][cands[i].c]=0;
      if(v>best)best=v;
      if(v>alpha)alpha=v;
      if(alpha>=beta)break;
    }
    return best;
  }

  function aiMove(){
    var cands=getCands(board);
    sortCands(cands,2);

    // Win in 1?
    for(var i=0;i<cands.length;i++){
      board[cands[i].r][cands[i].c]=2;
      if(checkWin(board,cands[i].r,cands[i].c,2)){board[cands[i].r][cands[i].c]=0;return cands[i]}
      board[cands[i].r][cands[i].c]=0;
    }
    // Block opponent win in 1?
    for(var i=0;i<cands.length;i++){
      board[cands[i].r][cands[i].c]=1;
      if(checkWin(board,cands[i].r,cands[i].c,1)){board[cands[i].r][cands[i].c]=0;return cands[i]}
      board[cands[i].r][cands[i].c]=0;
    }

    var bestMove=cands[0],bestScore=-Infinity;
    var depth=5;
    var top=cands.slice(0,16);
    for(var i=0;i<top.length;i++){
      board[top[i].r][top[i].c]=2;
      var sc=-negamax(board,depth-1,-Infinity,Infinity,1);
      board[top[i].r][top[i].c]=0;
      if(sc>bestScore){bestScore=sc;bestMove=top[i];if(bestScore>=89000)break}
    }
    return bestMove||cands[0];
  }

  // ── Input ────────────────────────────────────────────────────────────────
  canvas.addEventListener('click',function(e){
    if(gameOver||thinking||currentPlayer!==1)return;
    var rect=canvas.getBoundingClientRect();
    var W=parseFloat(canvas.style.width)||SZ;
    var scale=SZ/W;
    var x=(e.clientX-rect.left)*scale;
    var y=(e.clientY-rect.top)*scale;
    var r=Math.round((x-PAD)/CELL);
    var c=Math.round((y-PAD)/CELL);
    if(r<0||r>=BS||c<0||c>=BS||board[r][c])return;

    board[r][c]=1;
    lastMove={r:r,c:c,player:1};
    moveHistory.push({r:r,c:c,player:1});
    drawBoard();

    if(checkWin(board,r,c,1)){gameOver=true;setStatus('🎉 你赢了！','ti-done');document.getElementById('think').textContent='';drawWinLine(r,c,1);return}

    currentPlayer=2;thinking=true;
    setStatus('⚪ AI思考…','ti-wh');document.getElementById('think').textContent='🤖…';
    setTimeout(function(){
      try{
        var move=aiMove();
        board[move.r][move.c]=2;
        lastMove={r:move.r,c:move.c,player:2};
        moveHistory.push({r:move.r,c:move.c,player:2});
        drawBoard();
        if(checkWin(board,move.r,move.c,2)){gameOver=true;setStatus('🤖 AI 获胜！','ti-wh');document.getElementById('think').textContent='';drawWinLine(move.r,move.c,2);thinking=false;return}
      }catch(ex){
        document.getElementById('err').textContent='AI错误: '+ex.message;
        document.getElementById('err').style.display='block';
      }
      currentPlayer=1;thinking=false;
      setStatus('⚫ 黑方回合','ti-bk');document.getElementById('think').textContent='';
    },80);
  });

  window.undoMove=function(){
    if(thinking||gameOver||moveHistory.length<2)return;
    for(var i=0;i<2;i++){var m=moveHistory.pop();if(m){board[m.r][m.c]=0;lastMove=moveHistory.length?moveHistory[moveHistory.length-1]:null}}
    currentPlayer=1;gameOver=false;thinking=false;
    setStatus('⚫ 黑方回合','ti-bk');document.getElementById('think').textContent='';drawBoard();
  };

  window.initGame=initGame;

  // ── Start ────────────────────────────────────────────────────────────────
  initGame();

})();
</script>
</body>
</html>
