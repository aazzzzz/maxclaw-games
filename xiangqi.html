<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>弹珠打砖块</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080818;min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-family:'PingFang SC',sans-serif;color:#fff;
  overflow:hidden;touch-action:none
}
canvas{display:block;border-radius:8px;box-shadow:0 0 40px rgba(0,150,255,.15)}
.info{display:flex;gap:20px;margin-top:12px;font-size:.9rem;color:#6699cc;align-items:center}
.sc{font-size:1.4rem;font-weight:700;color:#00d4ff}
.lbl{font-size:.72rem;color:#445566}
.btn{
  padding:7px 18px;border:1px solid #00d4ff;background:rgba(0,212,255,.08);
  color:#00d4ff;border-radius:7px;cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .2s
}
.btn:hover{background:rgba(0,212,255,.2)}
.overlay{
  position:fixed;inset:0;background:rgba(0,0,18,.9);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:10;gap:16px
}
.overlay h2{font-size:2.2rem;color:#00d4ff;text-shadow:0 0 20px rgba(0,212,255,.5)}
.overlay p{color:#88aacc;font-size:1rem;text-align:center;max-width:300px;line-height:1.7}
.overlay .hint{color:#334455;font-size:.78rem}
</style>
</head>
<a href="../a><body>

<div class="overlay" id="menu">
  <h2>🎮 弹珠打砖块</h2>
  <p>鼠标控制挡板<br>消除所有彩色砖块！</p>
  <button class="btn" id="startBtn">开始游戏</button>
</div>

<div class="overlay" id="pauseScreen" style="display:none">
  <h2>⏸ 已暂停</h2>
  <button class="btn" id="resumeBtn">继续</button>
</div>

<div class="overlay" id="winScreen" style="display:none">
  <h2>🎉 过关！</h2>
  <p id="winMsg">进入下一关</p>
  <button class="btn" id="nextBtn">下一关</button>
</div>

<div class="overlay" id="loseScreen" style="display:none">
  <h2>💔 游戏结束</h2>
  <p id="loseMsg" style="color:#00d4ff;font-size:1.2rem;margin-top:4px"></p>
  <button class="btn" id="retryBtn">再试一次</button>
</div>

<canvas id="c"></canvas>
<div class="info">
  <div><div class="sc" id="scoreEl">0</div><div class="lbl">得分</div></div>
  <div><div class="sc" id="livesEl">❤️❤️❤️</div><div class="lbl">生命</div></div>
  <div><div class="sc" id="levelEl">1</div><div class="lbl">关卡</div></div>
</div>

<script>
// ─── Canvas setup ────────────────────────────────────────────────────────────
var canvas = document.getElementById('c');
// Fixed game area size (logical pixels)
var GW = 480, GH = 560;
canvas.width = GW;
canvas.height = GH;
var ctx = canvas.getContext('2d');

function resizeCanvas() {
  var scale = Math.min((window.innerWidth - 16) / GW, (window.innerHeight - 120) / GH, 1);
  canvas.style.width  = (GW * scale) + 'px';
  canvas.style.height = (GH * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── Layout constants ─────────────────────────────────────────────────────────
var COLS, BRICK_H, BRICK_PAD, BRICK_TOP, PADDLE_W, PADDLE_H, BALL_R;
function calcLayout() {
  COLS = 8 + Math.min(level, 5);
  BRICK_H  = Math.max(13, Math.floor(GH * 0.038));
  BRICK_PAD = 3;
  BRICK_TOP = Math.floor(GH * 0.06);
  PADDLE_W  = Math.max(60, Math.floor(GW * 0.2));
  PADDLE_H  = 11;
  BALL_R    = Math.max(5, Math.floor(GW * 0.009));
}
calcLayout();

// ─── Game state ───────────────────────────────────────────────────────────────
var score = 0, lives = 3, level = 1;
var bricks = [], ball = {}, paddle = {};
var particles = [], sparkles = [];
var running = false, paused = false, gamePaused = false;
var rafId = null;
var brickW;

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, n) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var s = Math.random() * 3 + 0.5;
    particles.push({ x: x, y: y, dx: Math.cos(a) * s, dy: Math.sin(a) * s - 1,
      life: 1, color: color, r: Math.random() * 2.5 + 1 });
  }
}
function tickParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.dx; p.y += p.dy; p.dy += 0.07; p.life -= 0.035;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── Drawing helpers ───────────────────────────────────────────────────────────
function rr(x, y, w, h, r) {
  // Safe rounded rect (don't use native roundRect)
  if (h <= 0 || w <= 0) return;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ─── Make bricks ──────────────────────────────────────────────────────────────
var COLORS = ['#ff4060','#ff6030','#ff9020','#ffd010',
              '#40d060','#00c0e0','#4080ff','#9040e0','#ff40b0','#6040ff'];

function makeBricks() {
  brickW = Math.floor((GW - 20) / COLS);
  bricks = [];
  var rows = 4 + Math.min(level, 5);
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < COLS; c++) {
      var hp = Math.random();
      bricks.push({
        x: 10 + c * brickW,
        y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
        w: brickW - BRICK_PAD - 2,
        h: BRICK_H,
        color: COLORS[(r + c) % COLORS.length],
        hp:   hp < 0.12 ? 3 : hp < 0.30 ? 2 : 1,
        maxHp: hp < 0.12 ? 3 : hp < 0.30 ? 2 : 1
      });
    }
  }
}

// ─── Init ball ────────────────────────────────────────────────────────────────
function initBall() {
  var speed = 4.0 + level * 0.35;
  var angle = -Math.PI / 4 - Math.random() * Math.PI * 0.6;
  ball = {
    x: GW / 2,
    y: GH - 60,
    dx: Math.cos(angle) * speed,
    dy: -Math.abs(Math.sin(angle) * speed),
    r: BALL_R,
    speed: speed
  };
}

// ─── Init paddle ───────────────────────────────────────────────────────────────
function initPaddle() {
  paddle = { x: GW / 2, y: GH - 32, w: PADDLE_W, h: PADDLE_H, dx: 0 };
}

// ─── Draw ──────────────────────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, GW, GH);
  // Grid
  ctx.strokeStyle = 'rgba(0,60,120,.06)';
  ctx.lineWidth = 1;
  for (var x = 0; x < GW; x += 24) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GH); ctx.stroke();
  }
  for (var y = 0; y < GH; y += 24) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GW, y); ctx.stroke();
  }
}

function drawBricks() {
  for (var i = 0; i < bricks.length; i++) {
    var b = bricks[i];
    if (b.hp <= 0) continue;

    // Color by HP
    var alpha = 1 - (b.maxHp - b.hp) * 0.15;
    ctx.globalAlpha = alpha;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    rr(b.x + 2, b.y + 2, b.w, b.h, 2);
    ctx.fill();

    // Gradient
    var g = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    g.addColorStop(0, lighten(b.color, 30));
    g.addColorStop(1, darken(b.color, 25));
    ctx.fillStyle = g;
    rr(b.x, b.y, b.w, b.h, 2);
    ctx.fill();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,.22)';
    rr(b.x + 2, b.y + 1, b.w - 4, Math.floor(b.h / 2), 1);
    ctx.fill();

    // HP number
    if (b.maxHp > 1) {
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + Math.max(8, b.h - 4) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(b.hp, b.x + b.w / 2, b.y + b.h / 2);
    }

    ctx.globalAlpha = 1;
  }
}

function drawPaddle() {
  var p = paddle;
  var g = ctx.createLinearGradient(p.x - p.w / 2, 0, p.x + p.w / 2, 0);
  g.addColorStop(0, 'rgba(0,160,255,.3)');
  g.addColorStop(0.5, 'rgba(0,210,255,.7)');
  g.addColorStop(1, 'rgba(0,160,255,.3)');
  ctx.fillStyle = g;
  rr(p.x - p.w / 2, p.y, p.w, p.h, 4);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,.28)';
  rr(p.x - p.w / 2 + 2, p.y + 1, p.w - 4, 3, 2);
  ctx.fill();
}

function drawBall() {
  var b = ball;
  // Glow
  var g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 2.8);
  g.addColorStop(0, 'rgba(255,255,255,.9)');
  g.addColorStop(0.3, 'rgba(120,200,255,.6)');
  g.addColorStop(1, 'rgba(0,80,200,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r * 2.8, 0, Math.PI * 2);
  ctx.fill();
  // Core
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fill();
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  ctx.beginPath();
  ctx.arc(b.x - b.r * .3, b.y - b.r * .3, b.r * .38, 0, Math.PI * 2);
  ctx.fill();
}

function draw() {
  drawBg();
  drawBricks();
  drawPaddle();
  drawBall();
  drawParticles();
}

// ─── Update ────────────────────────────────────────────────────────────────────
function update() {
  if (!running || paused) return;

  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall bounces
  if (ball.x - ball.r < 0)  { ball.x = ball.r;          ball.dx =  Math.abs(ball.dx); }
  if (ball.x + ball.r > GW)  { ball.x = GW - ball.r;      ball.dx = -Math.abs(ball.dx); }
  if (ball.y - ball.r < 0)    { ball.y = ball.r;           ball.dy =  Math.abs(ball.dy); }

  // Bottom = lose life
  if (ball.y + ball.r > GH) {
    loseLife();
    return;
  }

  // Paddle collision
  hitPaddle();

  // Brick collisions
  for (var i = 0; i < bricks.length; i++) {
    var b = bricks[i];
    if (b.hp <= 0) continue;

    var bx = b.x, by = b.y, bw = b.w, bh = b.h;
    if (ball.x + ball.r < bx || ball.x - ball.r > bx + bw ||
        ball.y + ball.r < by || ball.y - ball.r > by + bh) continue;

    // Resolve side
    var ol = (ball.x + ball.r) - bx;
    var or_ = (bx + bw) - (ball.x - ball.r);
    var ot = (ball.y + ball.r) - by;
    var ob = (by + bh) - (ball.y - ball.r);
    var mn = Math.min(ol, or_, ot, ob);

    if (mn === ol)      { ball.dx = -Math.abs(ball.dx); ball.x = bx - ball.r; }
    else if (mn === or_) { ball.dx =  Math.abs(ball.dx); ball.x = bx + bw + ball.r; }
    else if (mn === ot)  { ball.dy = -Math.abs(ball.dy); ball.y = by - ball.r; }
    else                 { ball.dy =  Math.abs(ball.dy); ball.y = by + bh + ball.r; }

    b.hp--;
    spawnParticles(bx + bw / 2, by + bh / 2, b.color, 10);
    score += (b.maxHp > 1 ? b.maxHp * 15 : 10);
    if (b.hp <= 0) score += 20;
    tickParticles();

    updateUI();
    break; // one brick per frame
  }

  // Win
  var allDead = true;
  for (var j = 0; j < bricks.length; j++) if (bricks[j].hp > 0) { allDead = false; break; }
  if (allDead) { running = false; cancelAnimationFrame(rafId); showWin(); return; }

  // Paddle momentum
  paddle.x += paddle.dx;
  paddle.dx *= 0.82;
  paddle.x = Math.max(paddle.w / 2, Math.min(GW - paddle.w / 2, paddle.x));

  tickParticles();
}

function hitPaddle() {
  var p = paddle, b = ball;
  if (b.y + b.r >= p.y && b.y - b.r <= p.y + p.h &&
      b.x >= p.x - p.w / 2 && b.x <= p.x + p.w / 2) {
    var hit = (b.x - p.x) / (p.w / 2); // -1..1
    var angle = hit * Math.PI * 0.44;
    var s = b.speed;
    b.dx = Math.sin(angle) * s;
    b.dy = -Math.abs(Math.cos(angle) * s);
    b.y = p.y - b.r - 0.5;
    spawnParticles(b.x, b.y + b.r, '#00d4ff', 5);
  }
}

// ─── Game loop ────────────────────────────────────────────────────────────────
function loop() {
  if (!running) return;
  update();
  draw();
  if (running) rafId = requestAnimationFrame(loop);
}

function startGame() {
  score = 0; lives = 3; level = 1;
  calcLayout();
  makeBricks();
  initBall();
  initPaddle();
  running = true; paused = false;
  cancelAnimationFrame(rafId);
  updateUI();
  hideAll();
  loop();
}

function nextLevel() {
  level++;
  calcLayout();
  makeBricks();
  initBall();
  initPaddle();
  running = true; paused = false;
  cancelAnimationFrame(rafId);
  updateUI();
  hideAll();
  loop();
}

function loseLife() {
  lives--;
  updateUI();
  if (lives <= 0) {
    running = false;
    cancelAnimationFrame(rafId);
    document.getElementById('loseMsg').textContent = '最终得分：' + score;
    document.getElementById('loseScreen').style.display = 'flex';
  } else {
    initBall();
  }
}

function updateUI() {
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('levelEl').textContent = level;
  document.getElementById('livesEl').textContent = '❤️'.repeat(Math.max(0, lives));
}

function showWin() {
  document.getElementById('winMsg').textContent = '进入第 ' + level + ' 关！';
  document.getElementById('winScreen').style.display = 'flex';
}

function hideAll() {
  var ids = ['menu','pauseScreen','winScreen','loseScreen'];
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (el) el.style.display = 'none';
  }
}

// ─── Input ────────────────────────────────────────────────────────────────────
var targetX = null;

canvas.addEventListener('mousemove', function(e) {
  if (!running) return;
  var rect = canvas.getBoundingClientRect();
  var sx = GW / rect.width;
  targetX = (e.clientX - rect.left) * sx;
  paddle.dx = (targetX - paddle.x) * 0.2;
});

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!running) return;
  var rect = canvas.getBoundingClientRect();
  var sx = GW / rect.width;
  var t = e.touches[0];
  targetX = (t.clientX - rect.left) * sx;
  paddle.dx = (targetX - paddle.x) * 0.2;
}, { passive: false });

canvas.addEventListener('click', function() {
  if (!running) return;
  if (!paused) {
    paused = true;
    cancelAnimationFrame(rafId);
    document.getElementById('pauseScreen').style.display = 'flex';
  }
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('resumeBtn').addEventListener('click', function() {
  paused = false;
  document.getElementById('pauseScreen').style.display = 'none';
  loop();
});
document.getElementById('nextBtn').addEventListener('click', nextLevel);
document.getElementById('retryBtn').addEventListener('click', startGame);

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' || e.key === ' ') {
    if (running) {
      paused = !paused;
      if (paused) {
        cancelAnimationFrame(rafId);
        document.getElementById('pauseScreen').style.display = 'flex';
      } else {
        document.getElementById('pauseScreen').style.display = 'none';
        loop();
      }
    }
  }
  if (e.key === 'ArrowLeft')  paddle.dx = -7;
  if (e.key === 'ArrowRight') paddle.dx =  7;
});

// ─── Color utils ───────────────────────────────────────────────────────────────
function hexToRgb(h) {
  var n = parseInt(h.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function lighten(h, amt) {
  var c = hexToRgb(h);
  return 'rgb(' + c.map(function(v) { return Math.min(255, v + amt); }).join(',') + ')';
}
function darken(h, amt) {
  var c = hexToRgb(h);
  return 'rgb(' + c.map(function(v) { return Math.max(0, v - amt); }).join(',') + ')';
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
makeBricks();
initBall();
initPaddle();
draw();
</script>
</body>
</html>
