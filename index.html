<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>游戏合集</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0a18;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;
  color:#e8e0d5;padding:40px 16px;overflow-x:hidden}
h1{font-size:2rem;letter-spacing:.25em;color:#c8a040;text-shadow:0 0 30px rgba(200,160,64,.4);margin-bottom:8px;text-align:center}
.sub{font-size:.85rem;color:#556677;letter-spacing:.1em;margin-bottom:36px;text-align:center}
.games{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;width:100%;max-width:820px}
.card{
  background:linear-gradient(145deg,#16162a,#1a1a35);
  border-radius:16px;overflow:hidden;text-decoration:none;
  color:#e8e0d5;border:1px solid rgba(255,255,255,.06);
  transition:transform .2s,box-shadow .2s,border-color .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 50px rgba(0,0,0,.6);border-color:rgba(200,160,64,.35)}
.preview{width:100%;height:180px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative;overflow:hidden}
.gbody{padding:18px 20px 20px;flex:1;display:flex;flex-direction:column;gap:8px}
.name{font-size:1.15rem;font-weight:700;letter-spacing:.08em;color:#e8d5b0}
.desc{font-size:.8rem;color:#778899;line-height:1.65;flex:1}
.tag{display:inline-flex;gap:6px;flex-wrap:wrap}
.tag span{font-size:.7rem;padding:2px 9px;border-radius:20px;background:rgba(200,160,64,.12);color:#c8a040;border:1px solid rgba(200,160,64,.25)}
.tag .ai{background:rgba(100,200,100,.1);color:#60cc80;border-color:rgba(100,200,100,.2)}
.tag .hard{background:rgba(200,100,100,.1);color:#cc6060;border-color:rgba(200,100,100,.2)}
footer{margin-top:40px;font-size:.72rem;color:#334455;text-align:center;letter-spacing:.08em}
@media(max-width:500px){h1{font-size:1.5rem}.games{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>游戏合集</h1>
<p class="sub">点击卡片开始游戏</p>

<div class="games">

<a class="card" href="tetris/">
  <div class="preview" style="background:linear-gradient(135deg,#1a0030,#300060)">
    <div style="position:absolute;inset:0;background:conic-gradient(#7b2fff,#00d4ff,#7b2fff);opacity:.25;filter:blur(20px)"></div>
    <div style="position:relative;z-index:1">🧱</div>
  </div>
  <div class="gbody">
    <div class="name">俄罗斯方块</div>
    <div class="desc">经典益智游戏<br>方向键旋转移动，空格加速下落</div>
    <div class="tag"><span>益智</span><span class="hard">挑战模式</span></div>
  </div>
</a>

<a class="card" href="xiangqi.html">
  <div class="preview" style="background:linear-gradient(135deg,#001828,#00284a)">
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,#004080,transparent 60%),radial-gradient(ellipse at 70% 60%,#00a0cc,transparent 50%);opacity:.6"></div>
    <div style="position:relative;z-index:1">🎱</div>
  </div>
  <div class="gbody">
    <div class="name">弹珠打砖块</div>
    <div class="desc">鼠标控制挡板，消除彩色砖块<br>红色砖块需打多次，3条命</div>
    <div class="tag"><span>动作</span><span>多关卡</span></div>
  </div>
</a>

<a class="card" href="gomoku.html">
  <div class="preview" style="background:linear-gradient(135deg,#1a0c08,#2a1808)">
    <div style="position:absolute;inset:0;background:radial-gradient(#3a2000,transparent 70%);opacity:.7"></div>
    <div style="position:relative;z-index:1">⚫</div>
  </div>
  <div class="gbody">
    <div class="name">五子棋</div>
    <div class="desc">执黑先行，AI七层搜索<br>自动判赢，悔棋功能</div>
    <div class="tag"><span>策略</span><span class="ai">AI对手</span></div>
  </div>
</a>

<a class="card" href="connect4.html">
  <div class="preview" style="background:linear-gradient(135deg,#0a1a40,#0a2a60)">
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#1a4a8a,transparent 70%);opacity:.6"></div>
    <div style="position:relative;z-index:1">🟡</div>
  </div>
  <div class="gbody">
    <div class="name">Connect 4 · 四子棋</div>
    <div class="desc">七列六行，轮流放子<br>四子连珠获胜 · 可选AI对战</div>
    <div class="tag"><span>策略</span><span class="ai">AI对战</span></div>
  </div>
</a>

<a class="card" href="minesweeper.html">
  <div class="preview" style="background:linear-gradient(135deg,#0a0f1a,#0d1f2d)">
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 40% 35%,#1a3a5a,transparent 65%);opacity:.6"></div>
    <div style="position:relative;z-index:1">💣</div>
  </div>
  <div class="gbody">
    <div class="name">扫雷</div>
    <div class="desc">经典益智游戏<br>左键翻开 · 右键标记地雷 · 三种难度</div>
    <div class="tag"><span>益智</span><span>初/中/高级</span></div>
  </div>
</a>

</div>
<footer>Made by MaxClaw</footer>
